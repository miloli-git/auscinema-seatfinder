# Portable stack: API (Fastify) + web (Caddy serving the SPA and proxying the API behind
# an access gate). Optional watcher service under the `alerts` profile.
#
# Quick start:
#   cp .env.example .env        # then edit: set BASIC_AUTH_USER/HASH, SITE_ADDRESS
#   docker compose up -d --build
#   open http://localhost:8080  (or your SITE_ADDRESS)
#
# Enable seat-open alerts too:
#   cp ../packages/watcher/watch.config.json.example watch.config.json   # edit watches
#   docker compose --profile alerts up -d --build

services:
  # Postgres cache for "Seats Together" (cached adjacency discovery).
  # Internal compose network only — not published, not tunneled. The DB is a
  # rebuildable cache (low durability needs). schema.sql runs once on first boot
  # (empty pgdata) and is re-appliable via psql. api DATABASE_URL + depends_on
  # are wired (ST-3 #28) so /together + /catalog can read the cache.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?set POSTGRES_DB in .env}"
      POSTGRES_USER: "${POSTGRES_USER:?set POSTGRES_USER in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    environment:
      PORT: "3001"
      RATE_LIMIT_MAX: "${RATE_LIMIT_MAX:-120}"
      RATE_LIMIT_WINDOW_MS: "${RATE_LIMIT_WINDOW_MS:-60000}"
      # Cache pool for /together + /catalog (the "Seats Together" reads). Internal compose network
      # only. Wiring this in #28 recreates the live api container once (expected).
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    expose:
      - "3001"
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    environment:
      SITE_ADDRESS: "${SITE_ADDRESS:-:8080}"
      UPSTREAM_API: "api:3001"
      BASIC_AUTH_USER: "${BASIC_AUTH_USER:?set BASIC_AUTH_USER in .env}"
      BASIC_AUTH_HASH: "${BASIC_AUTH_HASH:?run 'caddy hash-password' and set BASIC_AUTH_HASH in .env}"
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      - api
    restart: unless-stopped

  # Optional: poll saved queries and webhook-alert when a wanted seat opens.
  # Enable with: docker compose --profile alerts up -d --build
  watcher:
    profiles: ["alerts"]
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    command: ["node", "packages/watcher/dist/cli.js", "watch", "/config/watch.config.json"]
    environment:
      WATCHER_WEBHOOK: "${WATCHER_WEBHOOK:-}"
      WATCHER_STATE_PATH: "/state/watch.state.json"
    volumes:
      - ./watch.config.json:/config/watch.config.json:ro
      - watcher-state:/state
    restart: unless-stopped

  # "Seats Together" ingester. Same image as api; reaches the internal db over the compose
  # network. NOT started by `up` (gated behind the `ingest` profile) and the default command is
  # informational only — the checkpoint run is an explicit one-shot:
  #   docker compose run --rm ingester node packages/ingester/dist/cli.js seed   /config/watches.json
  #   docker compose run --rm ingester node packages/ingester/dist/cli.js ingest --once
  # A scheduled hourly loop is `... ingest` (no --once); leave it off the live stack for now.
  ingester:
    profiles: ["ingest"]
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    command: ["node", "packages/ingester/dist/cli.js", "ingest"]
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      INGEST_WATCHES: "/config/watches.json"
      INGEST_INTERVAL_MS: "${INGEST_INTERVAL_MS:-3600000}"
    volumes:
      - ./watches.json:/config/watches.json:ro
    depends_on:
      - db
    restart: "no"

volumes:
  watcher-state:
  pgdata:
